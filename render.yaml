databases:
  - name: payton-db
    plan: free

services:
  - type: web
    name: payton-hub-consolidated
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: HUB_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: payton-db
          property: connectionString
      - key: SPREADSHEET_ID
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: ZOHO_ORG_ID
        sync: false
      - key: VAULT_AUTH_TOKEN
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
